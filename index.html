<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRX | SITE RELOCATION</title>
     <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blur"></div>
    
    <div class="move-card">
        <div class="status-box">
            <span class="dot"></span> RELOCATING_UPLINK
        </div>
        
        <h1>WE HAVE <span>MOVED</span></h1>
        <p>The FRX clan Hub has moved to a new secure domain for better performance and security updates.</p>
        
        <div class="link-display">
            https://zandexprime.github.io/frx-esport-clan
        </div>

        <a href="https://zandexprime.github.io/frx-esport-clan" class="move-btn">
            ENTER NEW HUB
        </a>

        <div class="auto-text">Redirecting in <span id="countdown">10</span>s...</div>
    </div>

   <script>
    // Set starting count to 10
    let count = 10; 
    const timerElement = document.getElementById('countdown');

    const timer = setInterval(() => {
        count--;
        
        // Update the text on screen
        if(timerElement) {
            timerElement.innerText = count;
        }

        // When it hits zero, move the user
        if(count <= 0) {
            clearInterval(timer);
            window.location.href = "https://zandexprime.github.io/frx-esport-clan";
        }
    }, 1000);
</script>
</body>
</html>
